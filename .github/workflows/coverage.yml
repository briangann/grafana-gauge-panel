name: Coverage Report

on:
  pull_request:

permissions: {}

jobs:
  coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage (PR)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save PR coverage
        run: |
          mkdir -p /tmp/pr-coverage
          cp coverage/coverage-summary.json /tmp/pr-coverage/coverage-summary.json

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: true

      - name: Install dependencies (base)
        run: pnpm install --prefer-offline

      - name: Run tests with coverage (base)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save base coverage
        run: |
          mkdir -p /tmp/base-coverage
          cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json

      - name: Restore PR coverage
        run: |
          cp /tmp/pr-coverage/coverage-summary.json coverage/coverage-summary.json

      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2.11.2
        with:
          json-summary-compare-path: /tmp/base-coverage/coverage-summary.json
          file-coverage-mode: all
